backend:
  name: github
  repo: bryanjeshua/personal-blog
  branch: main
  base_url: https://bryanjeshua.github.io
  auth_endpoint: /personal-blog/admin/

# When working locally, use this instead:
# backend:
#   name: git-gateway
# local_backend: true

media_folder: public/images/uploads
public_folder: /personal-blog/images/uploads

collections:
  # Blog posts
  - name: blog
    label: Blog Posts
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Publish Date, name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: Author, name: author, widget: string, default: Bryan Jeshua }
      - { label: Featured Image, name: image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  # Landing page sections
  - name: settings
    label: Site Settings
    files:
      - label: Landing Page
        name: landing
        file: content/landing.json
        fields:
          - label: Hero Section
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: CTA Text, name: cta_text, widget: string }
              - { label: CTA Link, name: cta_link, widget: string }

          - label: Features
            name: features
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Icon, name: icon, widget: string, hint: "Emoji or icon name" }

          - label: About Section
            name: about
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Content, name: content, widget: markdown }

      - label: Site Metadata
        name: metadata
        file: content/metadata.json
        fields:
          - { label: Site Title, name: site_title, widget: string }
          - { label: Site Description, name: site_description, widget: string }
          - { label: Site URL, name: site_url, widget: string }
          - { label: Social Image, name: social_image, widget: image, required: false }

  # Pages
  - name: pages
    label: Pages
    folder: content/pages
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }
